<html lang="pl"><head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.13/html-to-image.min.js" integrity="sha512-iZ2ORl595Wx6miw+GuadDet4WQbdSWS3JLMoNfY8cRGoEFy6oT3G9IbcrBeL6AfkgpA51ETt/faX6yLV+/gFJg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
      (function() {
        const originalConsole = window.console;
        window.console = {
          log: (...args) => {
            originalConsole.log(...args);
            window.parent.postMessage({ type: 'console', message: args.join(' ') }, '*');
          },
          error: (...args) => {
            originalConsole.error(...args);
            window.parent.postMessage({ type: 'console', message: 'Error: ' + args.join(' ') }, '*');
          },
          warn: (...args) => {
            originalConsole.warn(...args);
            window.parent.postMessage({ type: 'console', message: 'Warning: ' + args.join(' ') }, '*');
          }
        };

        let requestId = 0;
        let callbacksMap = new Map();
        let streamControllers = new Map();
        
        window.claude = {
          complete: (prompt) => {
            return new Promise((resolve, reject) => {
              const id = requestId++;
              callbacksMap.set(id, { resolve, reject });
              window.parent.postMessage({ type: 'claudeComplete', id, prompt }, '*');
            });
          }
        };

        window.storage = {
          get: (key, shared = false) => {
            return new Promise((resolve, reject) => {
              const id = requestId++;
              callbacksMap.set(id, { resolve, reject });
              window.parent.postMessage({ type: 'storageGet', id, key, shared }, '*');
            });
          },
          set: (key, value, shared = false) => {
            return new Promise((resolve, reject) => {
              const id = requestId++;
              callbacksMap.set(id, { resolve, reject });
              window.parent.postMessage({ type: 'storageSet', id, key, value, shared }, '*');
            });
          },
          delete: (key, shared = false) => {
            return new Promise((resolve, reject) => {
              const id = requestId++;
              callbacksMap.set(id, { resolve, reject });
              window.parent.postMessage({ type: 'storageDelete', id, key, shared }, '*');
            });
          },
          list: (prefix, shared = false) => {
            return new Promise((resolve, reject) => {
              const id = requestId++;
              callbacksMap.set(id, { resolve, reject });
              window.parent.postMessage({ type: 'storageList', id, prefix, shared }, '*');
            });
          }
        };

        let pendingBlobs = new Map();
        URL.createObjectURL = (blob) => {
          // Store the blob and create an ID and URL for it
          const blobId = `blob-${Date.now()}-${Math.random()}`;
          pendingBlobs.set(blobId, blob);
          return `blob-request://${blobId}`;
        };

        URL.revokeObjectURL = (url) => {
          // Remove the blob from our store
          const blobId = url.replace("blob-request://", "");
          pendingBlobs.delete(blobId);
        };

        const getBlobFromURL = (url) => {
          const blobId = url.replace("blob-request://", "");
          return pendingBlobs.get(blobId);
        };

        // Override global fetch with streaming support
        window.fetch = (url, init = {}) => {
          return new Promise((resolve, reject) => {
            const id = requestId++;
            const channelId = `fetch-${id}-${Date.now()}`;
            
            callbacksMap.set(id, { 
              resolve: (response) => {
                // Create a ReadableStream for the response body
                const stream = new ReadableStream({
                  start(controller) {
                    streamControllers.set(channelId, controller);
                  },
                  cancel() {
                    streamControllers.delete(channelId);
                  }
                });
                
                // Create and return the Response with the stream
                resolve(new Response(stream, {
                  status: response.status,
                  statusText: response.statusText,
                  headers: response.headers
                }));
              },
              reject,
              channelId
            });
            
            window.parent.postMessage({
              type: 'proxyFetch',
              id,
              url,
              init,
              channelId
            }, '*');
          });
        };

        window.addEventListener('message', async (event) => {
          if (event.data.type === 'takeScreenshot') {
            const rootElement = document.getElementById('artifacts-component-root-html');
            if (!rootElement) {
              window.parent.postMessage({
                type: 'screenshotError',
                error: new Error('Root element not found'),
              }, '*');
              return;
            }
            // Catch CDN load failures (htmlToImage undefined) and toPng errors
            // so the parent always gets a response instead of hanging forever.
            try {
              const screenshot = await htmlToImage.toPng(rootElement, {
                imagePlaceholder:
                  "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAAAXNSR0IArs4c6QAAAA1JREFUGFdjePDgwX8ACOQDoNsk0PMAAAAASUVORK5CYII=",
              });
              window.parent.postMessage({
                type: 'screenshotData',
                data: screenshot,
              }, '*');
            } catch (err) {
              window.parent.postMessage({
                type: 'screenshotError',
                error: err instanceof Error ? err : new Error(String(err)),
              }, '*');
            }
          } else if (event.data.type === 'claudeComplete') {
            const callback = callbacksMap.get(event.data.id);
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
            } else {
              callback.resolve(event.data.completion);
            }
            callbacksMap.delete(event.data.id);
          } else if (event.data.type === 'proxyFetchResponse') {
            const callback = callbacksMap.get(event.data.id);
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
              callbacksMap.delete(event.data.id);
            } else {
              // Initial response with headers, status, etc.
              callback.resolve({
                status: event.data.status,
                statusText: event.data.statusText,
                headers: event.data.headers
              });
              // Don't delete the callback yet if streaming
              if (!event.data.body) {
                callbacksMap.delete(event.data.id);
              }
            }
          } else if (event.data.type === 'proxyFetchStream') {
            // Handle streaming data chunks
            const controller = streamControllers.get(event.data.channelId);
            if (controller) {
              if (event.data.error) {
                controller.error(new Error(event.data.error));
                streamControllers.delete(event.data.channelId);
              } else if (event.data.done) {
                controller.close();
                streamControllers.delete(event.data.channelId);
                // Clean up the callback
                const callback = Array.from(callbacksMap.entries()).find(
                  ([_, value]) => value.channelId === event.data.channelId
                );
                if (callback) {
                  callbacksMap.delete(callback[0]);
                }
              } else if (event.data.chunk) {
                controller.enqueue(new Uint8Array(event.data.chunk));
              }
            }
          } else if (event.data.type === 'storageGet') {
            const callback = callbacksMap.get(event.data.id);
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
            } else {
              callback.resolve(event.data.result);
            }
            callbacksMap.delete(event.data.id);
          } else if (event.data.type === 'storageSet') {
            const callback = callbacksMap.get(event.data.id);
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
            } else {
              callback.resolve(event.data.result);
            }
            callbacksMap.delete(event.data.id);
          } else if (event.data.type === 'storageDelete') {
            const callback = callbacksMap.get(event.data.id);
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
            } else {
              callback.resolve(event.data.result);
            }
            callbacksMap.delete(event.data.id);
          } else if (event.data.type === 'storageList') {
            const callback = callbacksMap.get(event.data.id);
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
            } else {
              callback.resolve(event.data.result);
            }
            callbacksMap.delete(event.data.id);
          }
        });

        window.addEventListener('click', (event) => {
          const isEl = event.target instanceof HTMLElement;
          if (!isEl) return;
    
          // find ancestor links
          const linkEl = event.target.closest("a");
          if (!linkEl || !linkEl.href) return;
    
          event.preventDefault();
          event.stopImmediatePropagation();
    
          if (linkEl.href.startsWith("blob-request:")) {
            const blob = getBlobFromURL(linkEl.href);
            if (!blob) return;
            void blob.arrayBuffer().then((data) => {
              window.parent.postMessage({
                type: "downloadFile",
                filename: linkEl.download,
                data,
                mimeType: blob.type || "application/octet-stream",
              });
            });
          } else if (linkEl.href.startsWith("data:")) {
            const [header, base64Data] = linkEl.href.split(",");
            const mimeMatch = header.match(/data:([^;]+)/);
            const mimeType = mimeMatch ? mimeMatch[1] : "application/octet-stream";
            const binaryString = atob(base64Data);
            const data = Uint8Array.from(binaryString, (c) =>
              c.charCodeAt(0),
            ).buffer;
            window.parent.postMessage({
              type: "downloadFile",
              filename: linkEl.download,
              data,
              mimeType,
            });
          } else {
            let linkUrl;
            try {
              linkUrl = new URL(linkEl.href);
            } catch (error) {
              return;
            }
    
            if (linkUrl.hostname === window.location.hostname) return;
      
            window.parent.postMessage({
              type: 'openExternal',
              href: linkEl.href,
            }, '*');
          }
      });

        const originalOpen = window.open;
        window.open = function (url) {
          window.parent.postMessage({
            type: "openExternal",
            href: url,
          }, "*");
        };

        window.addEventListener('error', (event) => {
          window.parent.postMessage({ type: 'console', message: 'Uncaught Error: ' + event.message }, '*');
        });
      })();
    </script>

<script>
var czyFirma = false;
var czyEUR = false;
var lista = [];
var rok = new Date().getFullYear();

try { lista = JSON.parse(localStorage.getItem('fv2_kpks') || '[]'); } catch(e) {}

window.onload = function() {
  var dz = new Date();
  document.getElementById('fdataW').value = dz.toISOString().split('T')[0];
  var dp = new Date(dz); dp.setDate(dp.getDate()+14);
  document.getElementById('fdataP').value = dp.toISOString().split('T')[0];
  ustawNr();
};

function ustawNr() {
  document.getElementById('fnr').value = 'FV/'+rok+'/'+padL(lista.length+1);
}
function padL(n) { return n < 10 ? '00'+n : n < 100 ? '0'+n : ''+n; }
function fD(s) { if(!s) return '—'; var p=s.split('-'); return p[2]+'.'+p[1]+'.'+p[0]; }
function f2(v) { return v.toLocaleString('pl-PL',{minimumFractionDigits:2,maximumFractionDigits:2}); }

function goTab(n) {
  document.getElementById('p1').className = 'page'+(n==1?' show':'');
  document.getElementById('p2').className = 'page'+(n==2?' show':'');
  document.getElementById('t1').className = 'tab'+(n==1?' active':'');
  document.getElementById('t2').className = 'tab'+(n==2?' active':'');
  if (n==2) rysujListe();
}

function ustawKl(f) {
  czyFirma = f==1;
  document.getElementById('dInd').style.display = czyFirma ? 'none' : 'block';
  document.getElementById('dFirm').style.display = czyFirma ? 'block' : 'none';
}

function ustawWal(e) {
  czyEUR = e==1;
  document.getElementById('dKurs').style.display = czyEUR ? 'block' : 'none';
}

function zbierzDane() {
  var kl = '', klDet = '';
  if (czyFirma) {
    kl = (document.getElementById('ffirma').value||'').trim();
    var n = (document.getElementById('fnip').value||'').trim();
    if (n) klDet = 'NIP: '+n;
  } else {
    kl = (document.getElementById('fimie').value||'').trim();
    var pe = (document.getElementById('fpesel').value||'').trim();
    if (pe) klDet = 'PESEL: '+pe;
  }
  var ul = (document.getElementById('fulica').value||'').trim();
  var ms = (document.getElementById('fmiasto').value||'').trim();
  if (ul) klDet += (klDet?'\n':'')+ul;
  if (ms) klDet += (klDet?'\n':'')+ms;
  return {
    nr: (document.getElementById('fnr').value||'').trim(),
    dataW: document.getElementById('fdataW').value,
    dataP: document.getElementById('fdataP').value,
    cena: parseFloat(document.getElementById('fcena').value)||0,
    kurs: parseFloat(document.getElementById('fkurs').value)||0,
    waluta: czyEUR ? 'EUR' : 'PLN',
    marka: (document.getElementById('fmarka').value||'').trim(),
    model: (document.getElementById('fmodel').value||'').trim(),
    rok: (document.getElementById('frok').value||'').trim(),
    vin: (document.getElementById('fvin').value||'').trim(),
    przebieg: (document.getElementById('fprzebieg').value||'').trim(),
    uwagi: (document.getElementById('fuwagi').value||'').trim(),
    kl: kl, klDet: klDet
  };
}

function pokazFakture() {
  var d = zbierzDane();
  /* walidacja VIN */
  if (d.vin && d.vin.length !== 17) {
    alert('Nieprawidłowy VIN!\nVIN musi mieć dokładnie 17 znaków.\nWpisałeś: ' + d.vin.length + ' znaków.');
    return;
  }
  /* walidacja PESEL */
  var pesel = (document.getElementById('fpesel').value || '').trim();
  if (pesel) {
    if (pesel.length !== 11) {
      alert('Nieprawidłowy PESEL!\nPESEL musi mieć dokładnie 11 cyfr.\nWpisałeś: ' + pesel.length + ' znaków.');
      return;
    }
    if (!/^[0-9]+$/.test(pesel)) {
      alert('Nieprawidłowy PESEL!\nPESEL może zawierać tylko cyfry.');
      return;
    }
  }

  lista.push({id:Date.now(), nr:d.nr, dataW:d.dataW, dataP:d.dataP,
    cena:d.cena, kurs:d.kurs, waluta:d.waluta, marka:d.marka, model:d.model,
    rok:d.rok, vin:d.vin, przebieg:d.przebieg, uwagi:d.uwagi, kl:d.kl, klDet:d.klDet});
  localStorage.setItem('fv2_kpks', JSON.stringify(lista));

  var opis = d.marka+' '+d.model+(d.rok?', rok '+d.rok:'');
  var opisD = opis+(d.vin?', VIN: '+d.vin:'')+(d.przebieg?', przebieg: '+parseInt(d.przebieg).toLocaleString('pl-PL')+' km':'');

  var extra = '';
  if (d.waluta==='EUR' && d.kurs) {
    extra = '<tr><td style="color:#888;font-size:11px">Kurs EUR: '+d.kurs.toFixed(4)+'</td><td></td></tr>'
      +'<tr><td style="color:#888;font-size:11px">Wartość PLN</td><td style="text-align:right;font-size:11px">'+f2(d.cena*d.kurs)+' PLN</td></tr>';
  }

  document.getElementById('fvBody').innerHTML =
    '<div class="fv-hdr">'
    +'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 110" width="240" height="55">'
    +'<polygon points="15,55 45,8 58,8 28,55 58,102 45,102" fill="none" stroke="#1a2e50" stroke-width="2.5" stroke-linejoin="round"/>'
    +'<polygon points="33,55 63,8 76,8 46,55 76,102 63,102" fill="none" stroke="#4a6fa5" stroke-width="1.5" stroke-linejoin="round"/>'
    +'<polygon points="51,55 81,8 94,8 64,55 94,102 81,102" fill="none" stroke="#8aadd4" stroke-width="1" stroke-linejoin="round"/>'
    +'<rect x="108" y="6" width="2" height="98" fill="#1a2e50"/>'
    +'<text x="118" y="46" font-family="Georgia,serif" font-size="34" font-weight="700" letter-spacing="2" fill="#1a2e50">K.P. K.S.</text>'
    +'<rect x="118" y="57" width="340" height="1.5" fill="#1a2e50"/>'
    +'<text x="119" y="76" font-family="Arial,sans-serif" font-size="10" letter-spacing="5" fill="#4a6fa5">SAMOCHODY Z HOLANDII</text>'
    +'</svg>'
    +'<div class="fv-meta"><div class="fnr">'+d.nr+'</div>'
    +'<div class="fdt">Wystawiono: '+fD(d.dataW)+'</div>'
    +'<div class="fdt">Płatność do: '+fD(d.dataP)+'</div></div>'
    +'</div>'
    +'<div class="fv-strony">'
    +'<div class="fv-str"><h3>Sprzedawca</h3><div class="fnm">Kwatery Pracownicze, Karla Stankiewicz</div><p>Kostromska 62A/64<br>97-300 Piotrków Trybunalski<br>NIP: 7712920232</p></div>'
    +'<div class="fv-str"><h3>Nabywca</h3><div class="fnm">'+d.kl+'</div><p>'+d.klDet.replace(/\n/g,'<br>')+'</p></div>'
    +'</div>'
    +'<table class="fv-table"><thead><tr><th>Lp.</th><th>Przedmiot sprzedaży</th><th style="text-align:right">Kwota</th></tr></thead>'
    +'<tbody><tr><td>1.</td><td>'+opisD+'</td><td style="text-align:right;font-weight:700">'+f2(d.cena)+' '+d.waluta+'</td></tr></tbody></table>'
    +'<div class="fv-suma"><table>'+extra
    +'<tr><td colspan="2"><hr style="border:none;border-top:2px solid #1a2e50;margin:6px 0"></td></tr>'
    +'<tr class="tot"><td>Do zapłaty</td><td style="text-align:right">'+f2(d.cena)+' '+d.waluta+'</td></tr>'
    +'</table></div>'
    +'<div class="fv-platnosc"><strong>Płatność:</strong> gotówka lub przelew<br>'
    +'<strong>Konto PLN:</strong> 23 1140 2004 0000 3902 8252 4133'
    +(d.uwagi ? '<br><strong>Uwagi:</strong> '+d.uwagi : '')+'</div>'
    +'<div class="fv-vat">Procedura marży — towary używane. Art. 120 ustawy z 11.03.2004 r. o podatku od towarów i usług.</div>'
    +'<div class="fv-stopka"><div class="fv-podpis">Sprzedawca</div><div class="fv-podpis">Nabywca</div></div>';

  document.getElementById('ekranForma').style.display = 'none';
  document.getElementById('ekranFaktury').style.display = 'block';
  window.scrollTo(0,0);
  ustawNr();
}

function wrocDoFormy() {
  document.getElementById('ekranFaktury').style.display = 'none';
  document.getElementById('ekranForma').style.display = 'block';
  window.scrollTo(0,0);
}

function wyczyscForm() {
  if (!confirm('Wyczyścić formularz?')) return;
  var ids = ['fimie','fpesel','ffirma','fnip','fulica','fmiasto','fmarka','fmodel','frok','fvin','fprzebieg','fcena','fkurs','fuwagi'];
  for (var i=0; i<ids.length; i++) { var el=document.getElementById(ids[i]); if(el) el.value=''; }
  document.getElementById('kInd').checked = true;
  document.getElementById('wPLN').checked = true;
  ustawKl(0); ustawWal(0);
}

function pobierzApp() {
  var h = document.documentElement.outerHTML;
  var b = new Blob([h],{type:'text/html;charset=utf-8'});
  var u = URL.createObjectURL(b);
  var a = document.createElement('a');
  a.href=u; a.download='faktury-kpks.html';
  document.body.appendChild(a); a.click();
  setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(u); },1000);
}

function rysujListe() {
  var div = document.getElementById('listaDiv');
  if (!lista.length) { div.innerHTML='<div class="empty">Brak faktur.<br><br>Wypełnij formularz i kliknij<br><b>Podgląd i druk</b></div>'; return; }
  var h = '';
  for (var i=lista.length-1; i>=0; i--) {
    var fv = lista[i];
    h += '<div class="inv-row">'
      +'<div class="inv-top">'
      +'<div><div class="inv-nr">'+fv.nr+'</div><div class="inv-info">'+fv.kl+' · '+fv.marka+' '+fv.model+(fv.rok?' '+fv.rok:'')+' · '+fD(fv.dataW)+'</div></div>'
      +'<div class="inv-amt">'+f2(fv.cena)+' '+fv.waluta+'</div>'
      +'</div>'
      +'<button class="bdel" type="button" onclick="usun('+i+')">Usuń</button>'
      +'</div>';
  }
  div.innerHTML = h;
}

function usun(i) {
  if (!confirm('Usunąć?')) return;
  lista.splice(i,1);
  localStorage.setItem('fv2_kpks', JSON.stringify(lista));
  ustawNr(); rysujListe();
}
</script>
